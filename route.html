<!DOCTYPE html>
<html lang="he" dir="rtl" data-root="..">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>מסלול המסע · מסע בארץ ישראל</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/route.css">
</head>
<body>

  <main class="wrap">

    <header class="topbar">
      <div>
        <span class="eyebrow">מסע בארץ ישראל</span>
        <span class="topbar__student" id="studentName"></span>
      </div>
      <div class="topbar__actions">
        <button type="button" class="btn btn--quiet" data-a11y-toggle>נגישות</button>
        <button type="button" class="btn btn--quiet" data-nav="home">מסך הפתיחה</button>
      </div>
    </header>

    <section class="route-head">
      <div>
        <h1>מסלול המסע</h1>
        <p class="lead">חמש תחנות ומשימת סיכום. כל תחנה נפתחת עם השלמת הקודמת.</p>
      </div>
      <div class="route-head__meter">
        <p class="eyebrow" id="overallText">0% מהמסע הושלמו</p>
        <div class="meter" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="התקדמות כוללת">
          <div class="meter__fill" id="overallMeter"></div>
        </div>
      </div>
    </section>

    <div class="route" id="route">
      <svg class="route__line" id="routeLine" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
      <!-- התחנות מוזרקות כאן מ-route.js -->
    </div>

  </main>

  <!-- כרטיס תחנה -->
  <div class="sheet" id="stationSheet" hidden role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet__card">
      <h2 class="sheet__title" id="sheetTitle"></h2>
      <p class="sheet__subtitle" id="sheetSubtitle"></p>
      <p class="sheet__goal" id="sheetGoal"></p>

      <dl class="sheet__facts">
        <div class="sheet__fact"><dt>שלבים</dt><dd id="sheetSteps"></dd></div>
        <div class="sheet__fact"><dt>זמן משוער</dt><dd id="sheetTime"></dd></div>
        <div class="sheet__fact"><dt>מצב</dt><dd id="sheetState"></dd></div>
      </dl>

      <div class="sheet__actions">
        <button type="button" class="btn btn--primary" id="sheetEnter">כניסה לתחנה</button>
        <button type="button" class="btn" id="sheetClose">חזרה למסלול</button>
      </div>
    </div>
  </div>

  <script src="../data/stations.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/progress.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/accessibility.js"></script>
  <script src="../js/route.js"></script>
</body>
</html>
